<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Get help with TradeTrackFX. Submit a support ticket and track your request history for billing, technical issues or feature requests." />
    <title>TradeTrackFX | Support</title>
    <link rel="icon" href="2.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="style.css">
    <style>
        .support-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        .ticket-form {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow);
        }

        .ticket-form h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        select,
        input,
        textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }

        select:focus,
        input:focus,
        textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 130px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
            touch-action: manipulation;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }

        .ticket-history {
            margin-top: 50px;
        }

        .ticket-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ticket-item-info {
            flex: 1;
            min-width: 0;
        }

        .ticket-item-info .subject {
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .ticket-item-info .meta {
            font-size: 0.8rem;
            color: #888;
        }

        .status-pill {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-open {
            background: rgba(0, 212, 255, 0.1);
            color: var(--primary);
        }

        .status-closed {
            background: rgba(255, 255, 255, 0.05);
            color: #888;
        }

        .status-replied {
            background: rgba(0, 255, 163, 0.1);
            color: #00ffa3;
        }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .support-container {
                margin: 20px auto;
                padding: 0 14px 60px;
            }

            .ticket-form {
                padding: 24px 20px;
                border-radius: 16px;
            }

            .ticket-form h2 {
                font-size: 1.6rem;
            }

            select,
            input,
            textarea {
                padding: 13px 14px;
                font-size: 0.95rem;
            }

            .submit-btn {
                font-size: 1rem;
                padding: 15px;
            }

            .ticket-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .ticket-history h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="2.jpg" alt="logo" class="logo-image">
            <span class="logo-text">TradeTrackFX</span>
        </div>
        <button class="menu-toggle" id="navToggle">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="journal.html">📓 Journal</a></li>
            <li><a href="stats.html">📊 Stats</a></li>
            <li><a href="transactions.html">Wallet</a></li>
            <li><a href="reminders.html">🔔 Reminders</a></li>
            <li><a href="support.html" class="nav-active">Support</a></li>
            <li><a href="contact.html">🌐 Contact</a></li>
            <li><a href="plans.html" style="color: var(--primary); font-weight: 700;">💎 Get Pro</a></li>
            <li><a href="#" onclick="window.authLogout(); return false;" style="color: #888;">Logout</a></li>
        </ul>
    </nav>

    <div class="support-container">
        <section class="ticket-form">
            <h2>Support Ticket</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">How can we help you today? Our average response
                time is under 12 hours.</p>

            <form id="support-form">
                <div class="input-group">
                    <label>Issue Category</label>
                    <select id="category" required>
                        <option value="technical">Technical Issue</option>
                        <option value="billing">Billing/Subscription</option>
                        <option value="feature">Feature Request</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Brief summary of the issue" required>
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description" rows="5" placeholder="Please provide as much detail as possible..."
                        required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Transmit Ticket</button>
            </form>
        </section>

        <section class="ticket-history">
            <h3 style="margin-bottom: 20px;">Your Recent Tickets</h3>
            <div id="ticket-list">
                <p style="color: #666; text-align: center; padding: 20px;">Loading your ticket history...</p>
            </div>
        </section>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="support.js"></script>
    <script>
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('open');
        });
    </script>
</body>

</html>
